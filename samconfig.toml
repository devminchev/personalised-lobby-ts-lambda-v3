version = 0.1

###############################################################################
# For the existing “default” (EU) environment
###############################################################################
[default]
[default.global.parameters]
stack_name = "personalised-lobby-v3"

[default.build.parameters]
cached        = true
parallel      = true
use_container = false

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities         = "CAPABILITY_IAM"
confirm_changeset    = true
s3_prefix            = "personalised-lobby-v3"
region               = "eu-west-1"
resolve_s3           = true
image_repositories   = []
disable_rollback     = true
profile              = "lobby-playground"
parameter_overrides  = "StageName=\"v3\" LambdaArchitecture=\"arm64\""

[default.package.parameters]

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

[default.local_invoke.parameters]
env_vars = "env.eu.json"
