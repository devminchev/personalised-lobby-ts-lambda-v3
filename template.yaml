                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    CONTENTFUL_ACCESS_TOKEN: !Sub '{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_ACCESS_TOKEN:2}}'
                    CONTENTFUL_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_ENVIRONMENT:1}}"
                    CONTENTFUL_SIGNING_SECRET: !Sub '{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SIGNING_SECRET:3}}'
                    CONTENTFUL_WEBHOOKS_SIGNING_SECRET: !Sub '{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_WEBHOOKS_SIGNING_SECRET:2}}'
                    SPACE_ID: !Sub "{{resolve:ssm:/personalised-lobby/dev/SPACE_ID:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                PostGamesPayload:
                    Type: Api
                    Properties:
                        Path: /sync-games-payload
                        Method: post
                        RestApiId: !Ref LobbyPostApi
        Metadata:
            BuildMethod: makefile

    ApplicationResourceGroup:
        Type: AWS::ResourceGroups::Group
        Properties:
            Name:
                Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
            ResourceQuery:
                Type: CLOUDFORMATION_STACK_1_0

    ApplicationInsightsMonitoring:
        Type: AWS::ApplicationInsights::Application
        Properties:
            ResourceGroupName:
                Ref: ApplicationResourceGroup
            AutoConfigurationEnabled: "true"

    # get-section-view
    GetSectionViewFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-section-view
            CodeUri: ./functions/GetSectionViewFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"

                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetSectionView:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/section/{sectionslug}
                        Method: get
                        RestApiId: !Ref LobbyApi
        Metadata:
            BuildMethod: makefile

    # get-game-shuffle
    GetGameShuffleFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-game-shuffle
            CodeUri: ./functions/GetGameShuffleFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
