---
AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
    getNavigation
    getSections
    getGameConfig

    Sample SAM Template for Lobby lambdas

Globals:
    Function:
        Timeout: 3
        LoggingConfig:
            LogFormat: JSON

Parameters:
    StageName:
        Type: String
        Default: v2
        Description: The name of the deployment stage
    LambdaArchitecture:
        Type: String
        Default: arm64
        AllowedValues:
            - x86_64
            - arm64
        Description: Lambda architecture (x86_64 or arm64)
Resources:
    # API Resource
    LobbyApi:
        Type: AWS::Serverless::Api
        Properties:
            Name: "lobby-v2"
            StageName: !Ref StageName
            OpenApiVersion: "2.0"
            BinaryMediaTypes:
                - "*/*"
            EndpointConfiguration:
                Type: REGIONAL

    # POST API Resource (separate API GW without binary media/content encoding)
    LobbyPostApi:
        Type: AWS::Serverless::Api
        Properties:
            Name: "backoffice-v2"
            StageName: !Ref StageName
            OpenApiVersion: "2.0"
            EndpointConfiguration:
                Type: REGIONAL

    # Get navigation
    GetNavigationFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-navigation
            CodeUri: ./functions/GetNavigationFunction/
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetNavigation:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/navigation
                        Method: get
                        RestApiId: !Ref LobbyApi
        Metadata:
            BuildMethod: makefile

    # Get Sections
    GetViewFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-view
            CodeUri: ./functions/GetViewFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetSections:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/view/{viewslug}
                        Method: get
                        RestApiId: !Ref LobbyApi
        Metadata:
            BuildMethod: makefile

    # Get Games
    GetGamesFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-section-games
            CodeUri: ./functions/GetGamesFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetGames:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/view/{viewslug}/sections/{sectionid}/sitegames
                        Method: get
                        RestApiId: !Ref LobbyApi
        Metadata:
            BuildMethod: makefile

    # Get Personalised Games
    GetPersonalisedSectionGamesFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-personalised-section-games
            CodeUri: ./functions/GetPersonalisedSectionGamesFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetPersonalisedGames:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/view/{viewslug}/sections/{sectionid}/sitegames/personalised
                        Method: get
                        RestApiId: !Ref LobbyApi
                        RequestParameters:
                            - method.request.querystring.memberid:
                                  Required: true
        Metadata:
            BuildMethod: makefile

    # Get Suggested Games
    GetSuggestedForYouFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-suggested-for-you
            CodeUri: ./functions/GetSuggestedForYouFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"

                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetSuggestedForYou:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/suggested-for-you
                        Method: get
                        RestApiId: !Ref LobbyApi
                        RequestParameters:
                            - method.request.querystring.memberid:
                                  Required: true
        Metadata:
            BuildMethod: makefile

    # Get Recently Played Games
    GetRecentlyPlayedFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-recently-played
            CodeUri: ./functions/GetRecentlyPlayedFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"

                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetRecentlyPlayed:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/recently-played
                        Method: get
                        RestApiId: !Ref LobbyApi
                        RequestParameters:
                            - method.request.querystring.memberid:
                                  Required: true
        Metadata:
            BuildMethod: makefile


    # GetGameConfigAPI
    GetGameConfigFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-game-config
            CodeUri: ./functions/GetGameConfigFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetGameConfig:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/game-config/{gamename}
                        Method: get
                        RestApiId: !Ref LobbyApi
        Metadata:
            BuildMethod: makefile

    # Get GameInfo
    GetGameInfoFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-game-info
            CodeUri: ./functions/GetGameInfoFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetNavigation:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/games/{gamename}
                        Method: get
                        RestApiId: !Ref LobbyApi
        Metadata:
            BuildMethod: makefile

    # Get All Games Search
    GetAllGamesSearchFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-get-all-games-search
            CodeUri: ./functions/GetAllGamesSearchFunction/
            Handler: app.lambdaHandler
