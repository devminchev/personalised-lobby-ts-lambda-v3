    # get-personalised-extra-data
    GetPersonalisedExtraDataFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-personalised-extra-data
            CodeUri: ./functions/GetPersonalisedExtraDataFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetPersonalisedExtraData:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/personalised-extra-data
                        Method: get
                        RestApiId: !Ref LobbyApi
                        RequestParameters:
                            - method.request.querystring.memberid:
                                  Required: true
        Metadata:
            BuildMethod: makefile

  # get-recommended-games-on-exit
    GetRecommendedGamesOnExitFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-recommended-games-on-exit
            CodeUri: ./functions/GetRecommendedGamesOnExitFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetRecommendedGamesOnExit:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/gameskin/{gameskin}/recommended-games-on-exit
                        Method: get
                        RestApiId: !Ref LobbyApi
        Metadata:
            BuildMethod: makefile

    # get-bulk-game-data
    GetBulkGameDataFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-get-bulk-game-data
            CodeUri: ./functions/GetBulkGameDataFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Timeout: 40
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetBulkGameData:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/platform/{platform}/get-bulk-game-data
                        Method: get
                        RestApiId: !Ref LobbyApi
        Metadata:
            BuildMethod: makefile

    GetHistoricalGameTitlesFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-get-historical-game-titles
            CodeUri: ./functions/GetHistoricalGameTitlesFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}"
                    OS_PASS: !Sub "{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}"
                    CONTENTFUL_SPACE_LOCALE: !Sub "{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}"
                    EXECUTION_ENVIRONMENT: !Sub "{{resolve:ssm:/personalised-lobby/dev/EXECUTION_ENVIRONMENT:1}}"
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                GetHistoricalGameTitles:
                    Type: Api
                    Properties:
                        Path: /sites/{sitename}/game-historical-titles
                        Method: get
                        RestApiId: !Ref LobbyApi
        Metadata:
            BuildMethod: makefile

    # post-historical-game-titles-handler
    PostHistoricalGameTitlesHandlerFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: ./functions/PostHistoricalGameTitlesHandlerFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    HOST: !Sub "{{resolve:ssm:/personalised-lobby/dev/HOST:3}}"
                    OS_USER: !Sub '{{resolve:ssm:/personalised-lobby/dev/OS_USER:3}}'
                    OS_PASS: !Sub '{{resolve:ssm:/personalised-lobby/dev/OS_PASS:4}}'
                    CONTENTFUL_SPACE_LOCALE: !Sub '{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SPACE_LOCALE:1}}'
                    CONTENTFUL_ACCESS_TOKEN: !Sub '{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_ACCESS_TOKEN:2}}'
                    CONTENTFUL_ENVIRONMENT: !Sub '{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_ENVIRONMENT:1}}'
                    CONTENTFUL_SIGNING_SECRET: !Sub '{{resolve:ssm:/personalised-lobby/dev/CONTENTFUL_SIGNING_SECRET:3}}'
                    SPACE_ID: !Sub '{{resolve:ssm:/personalised-lobby/dev/SPACE_ID:1}}'
            Architectures:
                - !Ref LambdaArchitecture
            Events:
                PostHistoricGameTitlesHandler:
                    Type: Api
                    Properties:
                        Path: /historical-game-titles-handler
                        Method: post
                        RestApiId: !Ref LobbyPostApi
        Metadata:
            BuildMethod: makefile

    # post-games-payload-handler
    PostGamesPayloadFunction:
        Type: AWS::Serverless::Function
        Properties:
            FunctionName: personalisation-lobby-games-payload-handler
            CodeUri: ./functions/PostGamesPayloadFunction/  # Folder of the lambda function
            Handler: app.lambdaHandler  # Adjust the handler path to dist/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
